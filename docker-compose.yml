version: '3.8'

services:
  ids-app:
    build: .
    container_name: hybrid_ids_service
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      # Alternatively, specifically mount data and models for persistence
      # - ./data:/app/data
      # - ./models:/app/models
    environment:
      - PYTHONUNBUFFERED=1
    stdin_open: true # For interactive terminal if needed
    tty: true
    restart: unless-stopped

networks:
  default:
    name: ids_network
