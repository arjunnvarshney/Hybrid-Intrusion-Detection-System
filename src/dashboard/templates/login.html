<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hybrid IDS - Secure Login</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&family=Roboto+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #080a0c;
            --card-bg: rgba(13, 17, 23, 0.85);
            --border-color: rgba(48, 54, 61, 0.6);
            --accent-blue: #58a6ff;
            --accent-glow: rgba(88, 166, 255, 0.4);
            --text-main: #f0f6fc;
            --text-muted: #8b949e;
        }

        body {
            background: radial-gradient(circle at 50% 50%, #161b22 0%, #080a0c 100%);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin: 0;
        }

        /* Animated background particles effect */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(var(--accent-blue) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.05;
            z-index: -1;
            animation: moveSlow 20s linear infinite;
        }

        @keyframes moveSlow {
            from { background-position: 0 0; }
            to { background-position: 100px 100px; }
        }

        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 48px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 40px rgba(88, 166, 255, 0.05);
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-container {
            text-align: center;
            margin-bottom: 32px;
            animation: fadeIn 1s ease-out 0.3s forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .logo-shield {
            font-size: 3.5rem;
            filter: drop-shadow(0 0 15px var(--accent-glow));
            display: inline-block;
            transition: transform 0.3s ease;
        }

        .logo-shield:hover {
            transform: scale(1.1) rotate(5deg);
        }

        h4 {
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            color: #fff;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 32px;
            text-align: center;
        }

        .form-label {
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-blue) !important; /* High visibility for labels */
            margin-bottom: 8px;
            display: block;
        }

        .form-control {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-color);
            color: #fff !important;
            border-radius: 12px;
            padding: 12px 16px;
            font-family: 'Roboto Mono', monospace;
            transition: all 0.3s ease;
        }

        .form-control::placeholder {
            color: #484f58;
        }

        .form-control:focus {
            background: rgba(0, 0, 0, 0.5);
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 4px rgba(88, 166, 255, 0.15);
            outline: none;
            color: #fff;
        }

        .btn-primary {
            background: linear-gradient(45deg, #1f6feb, #58a6ff);
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-weight: 700;
            font-size: 1rem;
            margin-top: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(31, 111, 235, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(88, 166, 255, 0.4);
            filter: brightness(1.1);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .alert {
            background: rgba(248, 81, 73, 0.1);
            border: 1px solid rgba(248, 81, 73, 0.4);
            color: #ff7b72;
            border-radius: 12px;
            font-size: 0.85rem;
            padding: 12px;
            margin-bottom: 24px;
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .footer-text {
            text-align: center;
            margin-top: 32px;
            font-size: 0.75rem;
            color: #484f58;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-container">
            <span class="logo-shield">🛡️</span>
            <h4>Hybrid IDS Monitor</h4>
            <div class="subtitle text-muted">Authentication Required</div>
        </div>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="alert">
                <strong>Access Denied:</strong> {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-4">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" autocomplete="off" placeholder="Security Identity" required autofocus>
            </div>
            <div class="mb-4">
                <label class="form-label">Access Key</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Initialize Uplink</button>
        </form>

        <div class="footer-text uppercase">
            &copy; 2026 HYBRID SECURE CORE | V2.0.4
        </div>
    </div>
</body>
</html>
